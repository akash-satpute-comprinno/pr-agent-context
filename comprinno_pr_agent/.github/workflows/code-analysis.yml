name: Deep Code Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Analyze PR with Deep Code Analyzer
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install boto3==1.40.45
          pip install PyGithub==2.1.1
          pip install PyYAML==6.0.1
          pip install Jinja2==3.1.6
      
      - name: Run Deep Code Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_URL: ${{ github.event.pull_request.html_url }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          BEDROCK_MODEL: ${{ secrets.BEDROCK_MODEL || 'apac.amazon.nova-pro-v1:0' }}
          BEDROCK_TEMPERATURE: '0.3'
          BEDROCK_MAX_TOKENS: '4096'
        run: |
          python github_action_runner.py
        working-directory: deep_code_analyzer
